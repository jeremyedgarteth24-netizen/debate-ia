<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corroborador de Llave | Jeremy</title>
    <style>
        body { background: #0b0b10; color: #cdd6f4; font-family: sans-serif; padding: 20px; }
        .box { background: #1e1e2e; padding: 20px; border-radius: 12px; border: 1px solid #45475a; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #11111b; border: 1px solid #45475a; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #a6e3a1; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #11111b; }
        .status { margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 0.9rem; line-height: 1.4; display: none; }
        .error { background: #f38ba8; color: #11111b; display: block; }
        .success { background: #89b4fa; color: #11111b; display: block; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Corroborar Llave Gemini</h3>
        <input type="password" id="key" placeholder="Pega tu NUEVA API Key aquí">
        <button onclick="verificar()">VERIFICAR AHORA</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        async function verificar() {
            const k = document.getElementById('key').value.trim();
            const status = document.getElementById('status');
            
            if(!k) return alert("Pega una llave");
            
            status.style.display = "block";
            status.className = "status";
            status.innerHTML = "⏳ Consultando a Google...";

            try {
                // Esta ruta nos dice qué modelos TIENE PERMITIDOS esa llave exacta
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
                const data = await resp.json();

                if (data.error) {
                    status.classList.add('error');
                    status.innerHTML = `<b>LLAVE INVÁLIDA:</b><br>${data.error.message}`;
                } else {
                    // Si llegamos aquí, la llave está VIVA. Ahora buscamos el mejor modelo.
                    const lista = data.models.map(m => m.name.replace('models/', ''));
                    let modeloRecomendado = lista.includes('gemini-1.5-flash') ? 'gemini-1.5-flash' : lista[0];

                    status.classList.add('success');
                    status.innerHTML = `
                        ✅ <b>¡LLAVE FUNCIONAL!</b><br><br>
                        <b>Modelos disponibles para ti:</b><br>${lista.join(', ')}<br><br>
                        <b>Modelo recomendado para tu debate:</b><br><code>${modeloRecomendado}</code>
                    `;
                }
            } catch (e) {
                status.classList.add('error');
                status.innerHTML = "❌ Error de conexión. Revisa tu internet.";
            }
        }
    </script>
</body>
</html>
